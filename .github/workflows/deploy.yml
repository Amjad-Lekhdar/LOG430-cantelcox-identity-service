name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: identity-service-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy identity service
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment target
        run: scripts/deploy-compose.sh ps

      - name: Build and restart service
        run: scripts/deploy-compose.sh deploy

      - name: Wait for health endpoint
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8020/health; then
              exit 0
            fi
            echo "Waiting for identity service health check... ${attempt}/30"
            sleep 2
          done
          scripts/deploy-compose.sh logs
          exit 1

      - name: Show running containers
        if: always()
        run: scripts/deploy-compose.sh ps

services:
  identity-service:
    build: .
    container_name: cantelcox-identity-service
    ports:
      - "8020:8020"
    environment:
      SERVICE_NAME: ${SERVICE_NAME:-identity-service}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://identity:identity_password@identity-db:5432/identity_db}
    depends_on:
      identity-db:
        condition: service_healthy

  identity-db:
    image: postgres:16
    container_name: cantelcox-identity-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-identity_db}
      POSTGRES_USER: ${POSTGRES_USER:-identity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-identity_password}
    volumes:
      - identity-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-identity} -d ${POSTGRES_DB:-identity_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  identity-db-data:
